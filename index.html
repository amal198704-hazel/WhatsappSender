<!doctype html>
<html>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel='manifest' href='manifest.json'>
    <meta name='theme-color' content='#25D366'>
    <title>WhatsApp Sender PWA</title>
    <style>
        body {
            font-family: Arial;

            margin: 0;
            background: #eef2f5;
            padding: 16px 16px 90px
        }

        #p {
            display: none;
            position: fixed;
            inset: 0;
            background: #0006;
            align-items: center;
            justify-content: center
        }

        .c {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            text-align: center
        }

        button {
            padding: 10px 15px;
            margin: 6px
        }



        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif
        }

        /* body{} */
        .wrap {
            max-width: 700px;
            margin: auto;
            background: #fff;
            padding: 16px;
            border-radius: 12px
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px
        }

        #list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .card {
            position: relative;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #fafafa;
            cursor: pointer
        }

        .card.sel {
            border-color: #25D366;
            background: #eafaf0
        }

        .del {
            position: absolute;
            top: 8px;
            right: 10px;
            color: #c62828;
            font-weight: bold;
            cursor: pointer
        }

        .footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
            padding: 10px;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, .15)
        }

        #new {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #1565c0;
            color: #fff;
            font-size: 16px
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            align-items: center;
            justify-content: center;
            padding: 16px
        }

        .box {
            background: #fff;
            width: 100%;
            max-width: 520px;
            border-radius: 12px;
            padding: 16px
        }

        textarea {
            width: 100%;
            min-height: 180px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 14px
        }

        .iconBtn {
            border: none;
            border-radius: 999px;
            width: 46px;
            height: 46px;
            font-size: 18px;
            cursor: pointer
        }

        #back {
            background: #ececec
        }

        #ok {
            background: #25D366;
            color: #fff;
            padding: 0 18px;
            width: auto;
            border-radius: 24px;
            font-size: 16px
        }

        #ok i {
            margin-right: 8px
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h2>WhatsApp Sender</h2>
        <input id="mobile" placeholder="Mobile Number (919876543210)">
        <h3>Saved Messages</h3>
        <div id="list"></div>
    </div>

    <div class="footer">
        <button id="new">Add New</button>
    </div>

    <div class="modal" id="modal">
        <div class="box">
            <h3>Message</h3>
            <textarea id="msg"></textarea>
            <div class="actions">
                <button id="back" class="iconBtn"><i class="fa-solid fa-arrow-left"></i></button>
                <button id="ok" class="iconBtn"><i class="fa-brands fa-whatsapp"></i>Send</button>
            </div>
        </div>
    </div>

    <script>
        const KEY = "waMessagesV4";
        let arr = JSON.parse(localStorage.getItem(KEY) || "[]"), sel = -1;
        const list = document.getElementById("list"), modal = document.getElementById("modal"), msg = document.getElementById("msg");
        function save() { localStorage.setItem(KEY, JSON.stringify(arr)) }
        function render() {
            list.innerHTML = arr.length ? "" : "<p>No saved messages.</p>";
            arr.forEach((m, i) => {
                const d = document.createElement("div");
                d.className = "card" + (i === sel ? " sel" : "");
                d.innerHTML = '<div class="del">&times;</div>' + m.replace(/</g, "&lt;");
                d.onclick = e => { if (e.target.classList.contains("del")) return; sel = i; msg.value = m; modal.style.display = "flex"; render(); };
                d.querySelector(".del").onclick = e => { e.stopPropagation(); if (confirm("Delete this message?")) { arr.splice(i, 1); if (sel === i) sel = -1; save(); render(); } };
                list.appendChild(d);
            });
        }
        document.getElementById("new").onclick = () => { sel = -1; msg.value = ""; modal.style.display = "flex"; }
        document.getElementById("back").onclick = () => modal.style.display = "none";
        document.getElementById("ok").onclick = () => {
            const mobile = document.getElementById("mobile").value.replace(/\\D/g, "");
            const text = msg.value.trim();
            if (!mobile) { alert("Enter mobile number."); return; }
            if (!text) { alert("Enter a message."); return; }
            if (sel === -1) { arr.unshift(text); sel = 0; } else arr[sel] = text;
            save(); render(); modal.style.display = "none";
            window.open("https://wa.me/" + mobile + "?text=" + encodeURIComponent(text), "_blank");
        };
        render();


        <div id='p'>
            <div class='c'>
                <h3>Install App</h3>
                <p>Install this app for the best experience.</p><button id='i'>Install</button><button
                    onclick="p.style.display='none'">Later</button>
            </div>
        </div>

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        let dp;
        addEventListener('beforeinstallprompt', e => { e.preventDefault(); dp = e; p.style.display = 'flex'; });
        i.onclick = async () => { if (dp) { dp.prompt(); await dp.userChoice; p.style.display = 'none'; } };
    </script>
</body>

</html>
